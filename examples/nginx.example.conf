# AI Ops SaaS — Nginx Configuration
# Copy to /etc/nginx/sites-available/ai-ops
# Symlink: ln -s /etc/nginx/sites-available/ai-ops /etc/nginx/sites-enabled/
#
# Two deployment modes:
#
# Mode A (GCP HTTPS LB): SSL terminates at the load balancer. Nginx listens
#   on port 80 only. Remove the port-443 server block and the port-80 redirect.
#
# Mode B (Certbot): Nginx handles SSL directly. Run:
#   sudo certbot --nginx -d ops.yourdomain.com
#   Certbot will modify this file to add SSL directives.

# ── Rate limiting zones ─────────────────────────────────────────────
# Bug intake: 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=intake_limit:10m rate=10r/s;

# API endpoints: 20 requests/second per IP, burst of 10
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream ai_ops_web {
    server 127.0.0.1:8000;
    keepalive 4;
}

# ── HTTP server (redirect to HTTPS, or primary if behind GCP LB) ────
server {
    listen 80;
    server_name ops.yourdomain.com;

    # If using GCP LB (Mode A), keep this as the primary server block.
    # If using Certbot (Mode B), uncomment the redirect below and use
    # the port-443 block instead:
    #
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Static files ────────────────────────────────────────────────
    location /static/ {
        alias /srv/ai-ops-saas/current/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        gzip on;
        gzip_types text/css application/javascript application/json;
        gzip_min_length 256;
    }

    # ── Bug intake endpoint (rate limited) ──────────────────────────
    location /api/v1/intake {
        limit_req zone=intake_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://ai_ops_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API endpoints (rate limited) ────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://ai_ops_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Valor webhook endpoint (no rate limit) ──────────────────────
    location /webhooks/valor {
        proxy_pass http://ai_ops_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket support (for future real-time features) ───────────
    location /ws/ {
        proxy_pass http://ai_ops_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check (no rate limit, no logging) ────────────────────
    location /health {
        access_log off;
        proxy_pass http://ai_ops_web;
        proxy_set_header Host $host;
    }

    # ── Everything else (dashboard, admin, onboarding) ──────────────
    location / {
        proxy_pass http://ai_ops_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Block dotfiles ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Error pages ─────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

