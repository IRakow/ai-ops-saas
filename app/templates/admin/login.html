<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — AI Ops</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 16px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-brand .name {
      font-size: 20px;
      font-weight: 700;
      color: #4a90d9;
      letter-spacing: 0.5px;
    }

    .login-brand .sub {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    .login-card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 28px 30px;
    }

    .login-card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 22px;
    }

    .flash-messages { margin-bottom: 16px; }

    .flash {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .flash.error   { background: rgba(231, 76, 60, 0.15); border: 1px solid #e74c3c; color: #e74c3c; }
    .flash.success { background: rgba(39, 174, 96, 0.15);  border: 1px solid #27ae60; color: #2ecc71; }
    .flash.info    { background: rgba(74, 144, 217, 0.15); border: 1px solid #4a90d9; color: #4a90d9; }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #111126;
      border: 1px solid #2a2a45;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4a90d9;
    }

    input::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-login:hover { opacity: 0.88; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11.5px;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-brand">
      <div class="name">AI Ops Admin</div>
      <div class="sub">Operator Console</div>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@example.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Sign in</button>
      </form>
    </div>

    <div class="login-footer">AI Ops SaaS &mdash; Restricted access</div>
  </div>

</body>
</html>
