<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body style="margin:0; padding:0; background:#f4f4f7; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7; padding:40px 20px;">
        <tr>
            <td align="center">
                <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background:#0f0f1a; padding:24px 32px;">
                            <span style="color:#00d4aa; font-size:1.2rem; font-weight:700;">AI Ops</span>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:32px;">
                            <h2 style="margin:0 0 16px; color:#1a1a2e; font-size:1.3rem;">Bug Fix Completed</h2>
                            <p style="margin:0 0 16px; color:#555; font-size:0.95rem; line-height:1.6;">
                                A bug fix was completed for <strong>{{ tenant_name }}</strong>.
                            </p>
                            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa; border-radius:6px; margin-bottom:20px;">
                                <tr>
                                    <td style="padding:16px;">
                                        <p style="margin:0 0 6px; color:#888; font-size:0.8rem; text-transform:uppercase;">Session</p>
                                        <p style="margin:0 0 12px; color:#1a1a2e; font-size:0.95rem; font-weight:600;">{{ session_title }}</p>
                                        <p style="margin:0 0 6px; color:#888; font-size:0.8rem; text-transform:uppercase;">Verdict</p>
                                        <p style="margin:0; color:#00b894; font-size:0.95rem; font-weight:700;">{{ verdict }}</p>
                                    </td>
                                </tr>
                            </table>
                            {% if pr_url %}
                            <p style="margin:0 0 12px; color:#555; font-size:0.95rem;">
                                A pull request has been created: <a href="{{ pr_url }}" style="color:#00d4aa;">View PR</a>
                            </p>
                            {% endif %}
                            <a href="{{ dashboard_url }}" style="display:inline-block; padding:12px 24px; background:#00d4aa; color:#0f0f1a; text-decoration:none; border-radius:6px; font-weight:600; font-size:0.95rem;">View Session Details</a>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px; border-top:1px solid #eee;">
                            <p style="margin:0; color:#aaa; font-size:0.8rem;">AI Ops - Automated Bug Detection & Fixing</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
