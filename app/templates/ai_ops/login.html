{% extends "ai_ops/base_ai_ops.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-75">
        <div class="col-md-5 col-lg-4">
            <div class="card ai-ops-card shadow-lg">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="ai-ops-logo mb-3">
                            <i class="fas fa-robot fa-3x text-primary"></i>
                        </div>
                        <h3 class="fw-bold">AI Operations</h3>
                        <p class="text-muted">{{ config.APP_NAME }}</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('ai_ops.login') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control form-control-lg" id="email"
                                   name="email" required autofocus placeholder="you@example.com">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password"
                                   name="password" required placeholder="Enter password">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
